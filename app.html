<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tinkuy App · Mockup</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  .toolbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
  .menu-panel{background:#fff;border-bottom:2px solid #E5E7EB;padding:10px 22px 14px;position:sticky;top:57px;z-index:49;display:none;flex-wrap:wrap;gap:6px;}
  .menu-panel.open{display:flex;}
  .screen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:30px;padding:30px;justify-items:center;}
  .screen-pick{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .screen-pick .label{font-size:12px;font-weight:600;color:#6B7280;}
  .menu{display:flex;gap:6px;flex-wrap:wrap;}
  .menu .chip{font-size:11px;padding:5px 10px;}
  .h-grad-red{background:linear-gradient(135deg,#E11D2E,#F59E0B);color:#fff;padding:18px;padding-top:28px;}
  .h-grad-blue{background:linear-gradient(135deg,#1E40AF,#3B82F6);color:#fff;padding:18px;padding-top:28px;}
  .h-grad-green{background:linear-gradient(135deg,#0E9F6E,#10B981);color:#fff;padding:18px;padding-top:28px;}
  .h-grad-amber{background:linear-gradient(135deg,#D97706,#F59E0B);color:#fff;padding:18px;padding-top:28px;}
  .h-grad-purple{background:linear-gradient(135deg,#7C3AED,#A78BFA);color:#fff;padding:18px;padding-top:28px;}
  .h-grad-teal{background:linear-gradient(135deg,#0F766E,#14B8A6);color:#fff;padding:18px;padding-top:28px;}
  .h-grad-pink{background:linear-gradient(135deg,#DB2777,#F472B6);color:#fff;padding:18px;padding-top:28px;}
  .list-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6;}
  .ico-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .vote-opt{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:10px;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .vote-opt:hover{border-color:var(--tinkuy-blue);}
  .vote-opt.sel{border-color:var(--tinkuy-blue);border-width:2px;background:#EFF6FF;}
  .stepper{display:flex;gap:4px;}
  .stepper .step{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.3);}
  .stepper .step.on{background:#fff;}
  .ach-card{padding:10px;border-radius:10px;background:#fff;border:1px solid #E5E7EB;text-align:center;}
  .ach-card .ico{font-size:28px;}
  .reward-card{border:1px solid #E5E7EB;border-radius:12px;padding:10px;display:flex;gap:10px;align-items:center;}
  .empty-radio{width:18px;height:18px;border:2px solid #D1D5DB;border-radius:50%;flex-shrink:0;}
  .empty-radio.on{border-color:var(--tinkuy-blue);background:radial-gradient(circle,var(--tinkuy-blue) 0 5px,transparent 6px);}
  .pill-tab{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;background:#F3F4F6;color:#6B7280;cursor:pointer;}
  .pill-tab.on{background:#0B0F19;color:#fff;}
</style>
</head>
<body>

<header class="toolbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <a href="index.html" onclick="history.back();return false;" style="color:#6B7280;text-decoration:none;display:flex;align-items:center;gap:4px;">← Hub</a>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:32px;height:32px;border-radius:8px;" class="brand-grad"></div>
      <div><b>Tinkuy App</b> <span style="color:#9CA3AF;font-size:12px;">· 25 pantallas</span></div>
    </div>
  </div>
  <button onclick="toggleMenu()" id="menu-toggle" style="display:flex;align-items:center;gap:6px;background:#F3F4F6;border:1px solid #E5E7EB;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600;color:#374151;">
    <span id="menu-icon">☰</span> Pantallas <span id="menu-badge" style="background:#E11D2E;color:#fff;border-radius:999px;padding:0 6px;font-size:10px;">25</span>
  </button>
</header>
<div class="menu-panel" id="menu"></div>

<main class="screen-grid" id="screens"></main>

<script>
// ---- definición de pantallas ----
// Cada pantalla retorna HTML del contenido interior del phone-screen.

const screens = [
  // 1) ONBOARDING 1
  { key:'onb1', label:'Onboarding 1/3', body: `
    <div class="h-grad-red" style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:40px 24px;text-align:center;">
      <div style="font-size:120px;margin-bottom:20px;">🤝</div>
      <h2 style="font-size:26px;margin:0;font-weight:800;">Tu voz importa</h2>
      <p style="opacity:.9;margin:10px 0 0;">Conecta con jóvenes de tu comunidad y haz que tus ideas lleguen a quienes deciden.</p>
      <div style="display:flex;gap:6px;margin:24px 0 12px;">
        <div style="width:24px;height:6px;border-radius:3px;background:#fff;"></div>
        <div style="width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.4);"></div>
        <div style="width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.4);"></div>
      </div>
      <button onclick="go('onb2')" class="btn btn-block" style="background:#fff;color:#E11D2E;">Siguiente</button>
    </div>`},

  // 2) ONBOARDING 2
  { key:'onb2', label:'Onboarding 2/3', body: `
    <div class="h-grad-amber" style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:40px 24px;text-align:center;">
      <div style="font-size:120px;margin-bottom:20px;">🏆</div>
      <h2 style="font-size:26px;margin:0;font-weight:800;">Gana por participar</h2>
      <p style="opacity:.9;margin:10px 0 0;">Cada acción cívica suma <b>Karma</b>: descuentos BCP, becas, cartas y avales.</p>
      <div style="display:flex;gap:6px;margin:24px 0 12px;">
        <div style="width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.4);"></div>
        <div style="width:24px;height:6px;border-radius:3px;background:#fff;"></div>
        <div style="width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.4);"></div>
      </div>
      <button onclick="go('onb3')" class="btn btn-block" style="background:#fff;color:#D97706;">Siguiente</button>
    </div>`},

  // 3) ONBOARDING 3
  { key:'onb3', label:'Onboarding 3/3', body: `
    <div class="h-grad-green" style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:40px 24px;text-align:center;">
      <div style="font-size:120px;margin-bottom:20px;">🌎</div>
      <h2 style="font-size:26px;margin:0;font-weight:800;">Crece con tu comunidad</h2>
      <p style="opacity:.9;margin:10px 0 0;">Lidera iniciativas, accede a mentoría y cuida tu bienestar emocional.</p>
      <div style="display:flex;gap:6px;margin:24px 0 12px;">
        <div style="width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.4);"></div>
        <div style="width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.4);"></div>
        <div style="width:24px;height:6px;border-radius:3px;background:#fff;"></div>
      </div>
      <button onclick="go('login')" class="btn btn-block" style="background:#fff;color:#0E9F6E;">Empezar</button>
    </div>`},

  // 4) LOGIN
  { key:'login', label:'Login DNI', body: `
    <div class="brand-grad" style="color:#fff;padding:32px 22px;text-align:center;">
      <div style="width:60px;height:60px;border-radius:18px;background:rgba(255,255,255,.2);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;">T</div>
      <h2 style="font-size:22px;margin:14px 0 4px;font-weight:800;">Bienvenido</h2>
      <p style="opacity:.9;font-size:13px;margin:0;">Verifica tu identidad para entrar</p>
    </div>
    <div class="scroll" style="flex:1;padding:22px;">
      <label style="font-size:12px;font-weight:700;color:#374151;">DNI (8 dígitos)</label>
      <input class="input" style="margin-top:6px;letter-spacing:4px;" value="•• ••• •••" maxlength="8"/>
      <label style="font-size:12px;font-weight:700;color:#374151;margin-top:14px;display:block;">Fecha de nacimiento</label>
      <input class="input" style="margin-top:6px;" value="15 / 03 / 2006"/>
      <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:12px;margin-top:16px;font-size:11px;color:#1E40AF;">
        🔒 Tinkuy verifica tu identidad con <b>RENIEC</b>. Solo jóvenes 15-29 años. Tu DNI nunca se almacena en claro. Cumple <b>Ley 29733</b>.
      </div>
      <button onclick="go('liveness')" class="btn btn-primary btn-block" style="margin-top:16px;">Continuar →</button>
      <p style="text-align:center;font-size:11px;color:#6B7280;margin-top:14px;">¿Eres adulto/organización? <span style="color:#E11D2E;font-weight:600;">Conoce Tinkuy Aliado</span></p>
    </div>`},

  // 5) LIVENESS
  { key:'liveness', label:'Selfie biométrica', body: `
    <div style="background:#0B0F19;color:#fff;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px;text-align:center;">
      <p style="font-size:12px;opacity:.7;letter-spacing:1px;">PASO 2 · BIOMETRÍA</p>
      <h2 style="font-size:22px;margin:8px 0 20px;font-weight:800;">Validación facial</h2>
      <div style="width:200px;height:200px;border-radius:50%;border:4px dashed #E11D2E;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;" class="pulse">🤳</div>
      <p style="margin-top:24px;font-size:13px;opacity:.85;">Centra tu rostro y parpadea cuando se ilumine</p>
      <div style="background:rgba(255,255,255,.06);border-radius:12px;padding:12px;margin-top:24px;width:100%;font-size:11px;text-align:left;">
        ✓ Validación cruzada con RENIEC<br>
        ✓ Tu cara nunca se guarda en servidores<br>
        ✓ Cumplimiento estricto Ley PDP
      </div>
      <button onclick="go('verified')" class="btn btn-primary btn-block" style="margin-top:24px;">Capturar selfie</button>
    </div>`},

  // 6) VERIFIED
  { key:'verified', label:'Cuenta verificada', body: `
    <div class="h-grad-green" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px;text-align:center;color:#fff;">
      <div style="width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:70px;">✓</div>
      <h2 style="font-size:26px;margin:20px 0 6px;font-weight:800;">¡Bienvenida, Camila!</h2>
      <p style="opacity:.9;font-size:14px;">Tu identidad fue verificada con RENIEC</p>
      <div style="background:rgba(255,255,255,.15);border-radius:12px;padding:14px;margin-top:24px;width:100%;text-align:left;font-size:12px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><b>Camila R. Quispe</b><span class="badge" style="background:#fff;color:#0E9F6E;">VERIFICADA</span></div>
        <div style="opacity:.9;">📍 Cusco, Cusco · 19 años</div>
        <div style="opacity:.9;">🎓 UNSAAC · Antropología</div>
      </div>
      <button onclick="go('home')" class="btn btn-block" style="background:#fff;color:#0E9F6E;margin-top:24px;">Entrar a Tinkuy</button>
    </div>`},

  // 7) HOME
  { key:'home', label:'🏠 Home (feed)', body: `
    <div class="brand-grad" style="color:#fff;padding:18px 18px 18px;padding-top:28px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:11px;opacity:.8;">Hola,</div>
          <div style="font-weight:800;font-size:18px;">Camila 👋</div>
        </div>
        <div style="display:flex;gap:8px;">
          <div onclick="go('notif')" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;">🔔<span style="position:absolute;top:-2px;right:-2px;background:#F59E0B;color:#fff;font-size:9px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;">3</span></div>
          <div onclick="go('profile')" style="width:36px;height:36px;border-radius:50%;background:#FCD34D;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;color:#92400E;">CR</div>
        </div>
      </div>
      <div onclick="go('karma')" style="background:rgba(255,255,255,.15);backdrop-filter:blur(6px);border-radius:12px;padding:10px;margin-top:14px;display:flex;align-items:center;gap:10px;cursor:pointer;">
        <div style="width:42px;height:42px;border-radius:50%;" class="karma-ring"><div style="margin:4px;width:34px;height:34px;border-radius:50%;background:#fff;color:#D97706;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;">340</div></div>
        <div style="flex:1;font-size:12px;"><b>Karma Cívico</b><br><span style="opacity:.85;">160 puntos para tu próxima recompensa BCP</span></div>
        <span style="font-size:20px;opacity:.7;">›</span>
      </div>
    </div>
    <div class="scroll" style="flex:1;padding:14px;background:#F9FAFB;">
      <div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;">
        <span class="pill-tab on">Todo</span>
        <span class="pill-tab">🌱 Ambiente</span>
        <span class="pill-tab">🎭 Cultura</span>
        <span class="pill-tab">📚 Educación</span>
        <span class="pill-tab">💼 Emprend.</span>
      </div>

      <div style="margin-bottom:12px;"><b style="font-size:13px;">📍 Cerca de ti</b></div>

      <div onclick="go('event')" style="background:#fff;border-radius:14px;overflow:hidden;border:1px solid #E5E7EB;margin-bottom:10px;cursor:pointer;">
        <div style="height:90px;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;font-size:48px;">🌱</div>
        <div style="padding:12px;">
          <div style="display:flex;justify-content:space-between;align-items:start;"><span class="badge badge-green">Ambiente</span><span style="font-size:10px;color:#6B7280;">2.1 km</span></div>
          <div style="font-weight:700;font-size:14px;margin-top:6px;">Reforestación en Sacsayhuamán</div>
          <div style="font-size:11px;color:#6B7280;margin-top:2px;">Sáb 24 may · 8:00 am · 47 inscritos</div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
            <div style="display:flex;align-items:center;gap:-6px;">
              <div style="width:22px;height:22px;border-radius:50%;background:#FCA5A5;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;">M</div>
              <div style="width:22px;height:22px;border-radius:50%;background:#FCD34D;border:2px solid #fff;margin-left:-6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;">J</div>
              <div style="width:22px;height:22px;border-radius:50%;background:#86EFAC;border:2px solid #fff;margin-left:-6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;">+</div>
            </div>
            <span style="color:#E11D2E;font-weight:700;font-size:11px;">+50 karma →</span>
          </div>
        </div>
      </div>

      <div onclick="go('voz')" style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:14px;padding:12px;margin-bottom:10px;cursor:pointer;">
        <div style="display:flex;justify-content:space-between;"><span class="badge badge-blue">🗳️ Voz Pública</span><span style="font-size:10px;color:#1E40AF;font-weight:700;">⏱ 2 días</span></div>
        <div style="font-weight:700;font-size:14px;margin-top:6px;">¿Qué obra priorizar con S/ 200 000?</div>
        <div style="font-size:11px;color:#1E40AF;margin-top:2px;">Municipalidad de Cusco · 1 823 votos</div>
      </div>

      <div style="background:#fff;border-radius:14px;overflow:hidden;border:1px solid #E5E7EB;margin-bottom:10px;">
        <div style="height:90px;background:linear-gradient(135deg,#7C3AED,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:48px;">🎭</div>
        <div style="padding:12px;">
          <span class="badge badge-purple">Cultura</span>
          <div style="font-weight:700;font-size:14px;margin-top:6px;">Festival de danzas andinas</div>
          <div style="font-size:11px;color:#6B7280;margin-top:2px;">Dom 25 may · 4:00 pm · 132 inscritos · 5.4 km</div>
        </div>
      </div>

      <div style="background:#fff;border-radius:14px;padding:12px;border:1px solid #E5E7EB;margin-bottom:10px;">
        <span class="badge badge-amber">💰 BCP Fondo Verde</span>
        <div style="font-weight:700;font-size:13px;margin-top:6px;">Tu iniciativa califica para microfinanciamiento</div>
        <div style="font-size:11px;color:#6B7280;margin-top:2px;">Hasta S/ 3 000 sin garantía · respuesta en 5 días</div>
        <button onclick="go('fondo')" class="btn btn-amber btn-xs" style="margin-top:8px;">Aplicar ahora</button>
      </div>
    </div>
    ${tabBar('home')}
  `},

  // 8) EXPLORE MAP
  { key:'explore', label:'🗺️ Explorar mapa', body: `
    <div style="padding:14px 18px;padding-top:28px;background:#fff;border-bottom:1px solid #E5E7EB;">
      <div style="display:flex;gap:8px;align-items:center;">
        <input class="input" placeholder="🔍 Buscar iniciativas..." style="font-size:13px;padding:8px 12px;"/>
        <button class="btn btn-ghost btn-sm">⚙️</button>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;overflow-x:auto;">
        <span class="pill-tab on">Todo</span>
        <span class="pill-tab">🌱</span>
        <span class="pill-tab">🎭</span>
        <span class="pill-tab">📚</span>
        <span class="pill-tab">💼</span>
        <span class="pill-tab">🧠</span>
      </div>
    </div>
    <div style="flex:1;position:relative;background:linear-gradient(135deg,#E0F2FE,#DBEAFE);">
      <svg viewBox="0 0 300 400" style="width:100%;height:100%;">
        <!-- streets -->
        <path d="M0,100 L300,100 M0,200 L300,200 M0,300 L300,300 M100,0 L100,400 M200,0 L200,400" stroke="#94A3B8" stroke-width="1" opacity=".4"/>
        <!-- river -->
        <path d="M20,50 Q150,180 290,90" stroke="#60A5FA" stroke-width="8" fill="none" opacity=".6"/>
        <!-- pins -->
        <circle cx="120" cy="180" r="14" fill="#10B981"/><text x="120" y="184" text-anchor="middle" font-size="14">🌱</text>
        <circle cx="200" cy="120" r="14" fill="#7C3AED"/><text x="200" y="124" text-anchor="middle" font-size="14">🎭</text>
        <circle cx="80" cy="260" r="14" fill="#3B82F6"/><text x="80" y="264" text-anchor="middle" font-size="14">📚</text>
        <circle cx="230" cy="280" r="14" fill="#F59E0B"/><text x="230" y="284" text-anchor="middle" font-size="14">💼</text>
        <circle cx="150" cy="320" r="14" fill="#EC4899"/><text x="150" y="324" text-anchor="middle" font-size="14">🧠</text>
        <!-- user -->
        <circle cx="150" cy="220" r="20" fill="#E11D2E" opacity=".3"/>
        <circle cx="150" cy="220" r="10" fill="#E11D2E"/>
        <circle cx="150" cy="220" r="4" fill="#fff"/>
      </svg>
      <!-- bottom sheet -->
      <div style="position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:18px 18px 0 0;padding:14px;box-shadow:0 -8px 24px -8px rgba(0,0,0,.15);">
        <div style="width:36px;height:4px;background:#D1D5DB;border-radius:2px;margin:0 auto 12px;"></div>
        <div style="font-size:12px;color:#6B7280;margin-bottom:8px;font-weight:600;">🌱 Cerca de tu ubicación</div>
        <div onclick="go('event')" style="display:flex;gap:10px;align-items:center;border-bottom:1px solid #F3F4F6;padding-bottom:10px;cursor:pointer;">
          <div style="width:42px;height:42px;border-radius:10px;background:#D1FAE5;display:flex;align-items:center;justify-content:center;font-size:20px;">🌱</div>
          <div style="flex:1;"><div style="font-weight:700;font-size:13px;">Reforestación Sacsayhuamán</div><div style="font-size:11px;color:#6B7280;">2.1 km · sáb 8 am · +50 karma</div></div>
          <span style="font-size:20px;color:#9CA3AF;">›</span>
        </div>
        <div style="display:flex;gap:10px;align-items:center;padding-top:10px;">
          <div style="width:42px;height:42px;border-radius:10px;background:#EDE9FE;display:flex;align-items:center;justify-content:center;font-size:20px;">🎭</div>
          <div style="flex:1;"><div style="font-weight:700;font-size:13px;">Festival de danzas andinas</div><div style="font-size:11px;color:#6B7280;">5.4 km · dom 4 pm</div></div>
        </div>
      </div>
    </div>
    ${tabBar('explore')}
  `},

  // 9) EVENT DETAIL
  { key:'event', label:'Detalle de evento', body: `

function tabBar(active){
  const tabs = [['home','🏠','Inicio'],['explore','🗺️','Explorar'],['create','➕','Crear'],['channels','💬','Canales'],['profile','👤','Perfil']];
  return `<div class="tabbar">${tabs.map(([k,i,l])=>`<div class="t ${active===k?'on':''}" onclick="go('${k}')"><div class="ic">${i}</div>${l}</div>`).join('')}</div>`;
}

// ---- render ----
function renderAll(){
  const root = document.getElementById('screens');
  root.innerHTML = screens.map(s=>`
    <div class="screen-pick">
      <div class="phone">
        <div class="phone-screen" id="phone-${s.key}">${s.body}</div>
      </div>
      <div class="label">${s.label}</div>
    </div>
  `).join('');
  const menu = document.getElementById('menu');
  menu.innerHTML = screens.map(s=>`<span class="chip" style="font-size:11px;padding:5px 10px;" onclick="scrollTo('${s.key}')">${s.label}</span>`).join('');
}
function toggleMenu(){
  const panel = document.getElementById('menu');
  const icon = document.getElementById('menu-icon');
  panel.classList.toggle('open');
  icon.textContent = panel.classList.contains('open') ? '✕' : '☰';
}
function go(key){
  // open in single phone view - replicate to all phones for simplicity: just scroll to that one
  scrollTo(key);
}
function scrollTo(key){
  const el = document.getElementById('phone-'+key);
  if(el) el.closest('.screen-pick').scrollIntoView({behavior:'smooth',block:'center'});
}
renderAll();
</script>
